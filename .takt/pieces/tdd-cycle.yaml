name: tdd-cycle
description: |
  Test-Driven Development cycle for a single Rust function or module.
  Red (write failing test) -> Green (implement) -> Refactor.
  Use for focused, single-concern implementation tasks.
max_movements: 15
initial_movement: red-phase

movements:
  - name: red-phase
    persona: rust-implementer
    edit: true
    required_permission_mode: edit
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Write
      - Edit
      - Bash
    rules:
      - condition: "Failing test written and confirmed FAILING (cargo make test shows the target test as FAILED)"
        next: green-phase
      - condition: "Cannot write a meaningful test (requirements unclear)"
        next: ABORT

  - name: green-phase
    persona: rust-implementer
    edit: true
    required_permission_mode: edit
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Write
      - Edit
      - Bash
    rules:
      - condition: "Target test passes AND all previous tests still pass"
        next: refactor-phase
      - condition: "Implementation stuck after 3 attempts (borrow/lifetime issues)"
        next: debug-research-phase

  - name: debug-research-phase
    persona: rust-debugger
    edit: true
    required_permission_mode: edit
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Write
      - Edit
      - Bash
    rules:
      - condition: "Root cause identified and the original failing test is still valid"
        next: green-phase
      - condition: "The original test or task assumption needs correction"
        next: red-phase
      - condition: "Still blocked after debug and targeted research"
        next: ABORT

  - name: refactor-phase
    persona: rust-implementer
    edit: true
    required_permission_mode: edit
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Write
      - Edit
      - Bash
    rules:
      - condition: "Code refactored, all tests pass, cargo make clippy clean, cargo make fmt applied"
        next: note-writer
      - condition: "Refactoring introduced test failures"
        next: green-phase

  - name: note-writer
    persona: note-writer
    edit: true
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Write
      - Bash
    rules:
      - condition: "Note written to .takt/pending-note.md"
        next: COMPLETE
