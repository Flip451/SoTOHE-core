name: impl-review
description: |
  Review Rust implementation: quality checks (fmt/clippy/test),
  code review for correctness and idiomatic patterns,
  and track workflow integration.
max_movements: 12
initial_movement: quality-checker

movements:
  - name: quality-checker
    persona: quality-checker
    edit: false
    allowed_tools:
      - Bash
      - Read
    rules:
      - condition: "All quality checks passed (cargo make ci including check-layers, verify-arch-docs, verify-plan-progress, verify-orchestra, verify-latest-track)"
        next: rust-reviewer
      - condition: "Quality check failures detected"
        next: ABORT

  - name: rust-reviewer
    persona: rust-reviewer
    edit: false
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    rules:
      - condition: "Code approved: correct, idiomatic, safe, all criteria met"
        next: note-writer
      - condition: "Minor issues found (style, clippy suggestions, nitpicks)"
        next: note-writer
      - condition: "Significant issues found (correctness, safety, missing tests)"
        next: ABORT

  - name: note-writer
    persona: note-writer
    edit: true
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Write
      - Bash
    rules:
      - condition: "Note written to .takt/pending-note.md"
        next: COMPLETE
