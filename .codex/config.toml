model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
personality = "pragmatic"

[features]
hooks = true
multi_agent = true
shell_snapshot = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[[hooks.UserPromptSubmit]]
matcher = ""

# Advisory hook: `|| exit 0` keeps it fail-open. In a fresh trusted checkout
# `bin/sotp` is gitignored and may be unbuilt, so sotp-hook.sh exits 2 ("CLI not
# available"); without this guard that exit 2 would block UserPromptSubmit and
# lock the user out during onboarding. Mirrors the Claude advisory hook's
# `|| exit 0` / `else exit 0` fail-open. Enforcement PreToolUse hooks below stay
# fail-closed (no `|| exit 0`) — matching .claude/settings.json.
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'sh "$(git rev-parse --show-toplevel)/.codex/hooks/sotp-hook.sh" skill-compliance || exit 0'
timeout = 5
statusMessage = "Checking SoTOHE skill compliance"

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'sh "$(git rev-parse --show-toplevel)/.codex/hooks/sotp-hook.sh" hooks-path-setup'
timeout = 10
statusMessage = "Checking git hook setup"

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'sh "$(git rev-parse --show-toplevel)/.codex/hooks/sotp-hook.sh" block-direct-git-ops'
timeout = 10
statusMessage = "Checking git operation policy"

# `apply_patch` is listed explicitly: Codex routes file edits through apply_patch,
# which matches Write/Edit matchers but reports `tool_name: "apply_patch"` in the
# hook input. The guard (libs/usecase/src/hook/test_file_deletion.rs) parses the
# apply_patch payload (carried in tool_input.command) for `*** Delete File:`
# directives targeting test files. Without the explicit matcher entry the guard
# would not fire on apply_patch test-file deletions.
[[hooks.PreToolUse]]
matcher = "^(Bash|Write|apply_patch)$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'sh "$(git rev-parse --show-toplevel)/.codex/hooks/sotp-hook.sh" block-test-file-deletion'
timeout = 10
statusMessage = "Checking protected test files"
