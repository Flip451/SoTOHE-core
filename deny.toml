[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = []

[licenses]
allow = ["MIT", "Apache-2.0", "Unicode-3.0"]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false
skip = [
]

# Enforce layered architecture boundaries for this template workspace.
# Crate names can be changed, but wrappers must reflect your composition root.
deny = [
    { crate = "infrastructure", wrappers = ["cli"], reason = "Infrastructure implementations must be wired only at composition root." },
    { crate = "usecase", wrappers = ["cli"], reason = "Usecase crate must only be consumed by the cli layer." },
    { crate = "domain", wrappers = ["usecase", "infrastructure", "cli"], reason = "Domain dependencies are controlled by layer boundaries." },
]
