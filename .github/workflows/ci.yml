name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SCCACHE_HOST_DIR: /home/runner/.cache/sccache
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export host UID/GID for compose
        id: hostids
        run: |
          # GITHUB_ENV: consumed as shell env ($HOST_UID/$HOST_GID) by the compose
          # `user:` interpolation in the "Start CI container" run: block.
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"
          # GITHUB_OUTPUT: consumed as expressions (${{ steps.hostids.outputs.* }})
          # by the docker build-push-action build-args below. Step outputs are
          # reliably available to later steps' expressions, keeping CI_UID/CI_GID
          # unambiguously non-empty for the dev-base-ci chown.
          echo "host_uid=$(id -u)" >> "$GITHUB_OUTPUT"
          echo "host_gid=$(id -g)" >> "$GITHUB_OUTPUT"

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_HOST_DIR }}
          # Rolling key: the run-id suffix makes the key unique per run so the cache
          # is always saved at job end, and restore-keys restores the most recent
          # prior cache for warm incremental reuse. A static key is immutable once
          # written (actions/cache never overwrites an existing key), which froze the
          # persisted sccache dir at its first save and left every later run at 0%
          # Rust hit -> full recompile.
          key: ${{ runner.os }}-sccache-v3-${{ hashFiles('Dockerfile', '**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sccache-v3-${{ hashFiles('Dockerfile', '**/Cargo.lock') }}-
            ${{ runner.os }}-sccache-v3-

      - name: Prepare sccache directory
        run: mkdir -p ${{ env.SCCACHE_HOST_DIR }}

      - name: Prepare repo-local cache directories
        run: mkdir -p target .cache/cargo/registry .cache/cargo/git .cache/sccache .cache/home .cache/pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tools image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          target: tools
          push: false
          load: true
          tags: rust-sdd-template-tools:latest
          build-args: |
            BUILD_ENV=ci
            IMAGE_CARGO_TARGET_DIR=/cargo-target
            CI_UID=${{ steps.hostids.outputs.host_uid }}
            CI_GID=${{ steps.hostids.outputs.host_gid }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start CI container
        run: |
          docker compose run -d \
            --name ci-runner \
            tools tail -f /dev/null

      - name: Run CI suite
        # Override CARGO_HOME / CARGO_TARGET_DIR to the image-baked paths (outside
        # the /workspace bind mount) so the cook-baked deps are reused instead of
        # recompiled. These must match the build-time values for fingerprints to hit:
        # CARGO_HOME=/usr/local/cargo (baked registry), CARGO_TARGET_DIR=/cargo-target
        # (baked compiled deps, set via IMAGE_CARGO_TARGET_DIR at build time).
        run: docker exec -e CARGO_INCREMENTAL=0 -e CARGO_HOME=/usr/local/cargo -e CARGO_TARGET_DIR=/cargo-target ci-runner cargo make ci-container

      - name: Show sccache stats
        if: always()
        run: docker exec ci-runner sccache --show-stats || true

      - name: Stop CI container
        if: always()
        run: docker rm -f ci-runner || true

      - name: Fix cache permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ env.SCCACHE_HOST_DIR }} || true
