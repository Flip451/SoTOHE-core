# CI-only compose override.
#
# Problem: compose.yml bind-mounts the host workspace root (".") to /workspace,
# which also covers /workspace/target.  On GitHub Actions the host target/ is
# always empty, so the bind-mount shadows the dependency artifacts that the
# Dockerfile's dev-base-ci stage bakes into the image layer at /workspace/target.
# This forces every CI run to recompile all heavy native dependencies from
# scratch (build-scripts, linking) — even though cargo-chef already cooked them
# into the image.
#
# Fix: declare a named volume (ci-target) that is explicitly seeded from the
# image's /workspace/target contents in the ci.yml "Seed ci-target volume from
# image" step.  That step runs a short-lived container with ONLY the named
# volume mounted (no /workspace bind-mount), so the image-layer artifacts are
# copied into the volume unambiguously.  Because the volume mount path
# (/workspace/target) is more-specific than the bind-mount path (/workspace),
# Docker's volume-wins-over-bind-mount rule then ensures the named volume — now
# pre-populated with the baked dependency artifacts — is what cargo sees at
# /workspace/target during the main CI run, while the rest of /workspace still
# comes from the host bind-mount.
#
# Ownership: the seeding step runs as root and chowns /workspace/target to
# HOST_UID:HOST_GID inside the volume before the main container starts, so the
# runtime container (which runs as HOST_UID:HOST_GID) can write to it.
#
# Local dev: this file is NEVER loaded by `cargo make ci` (which uses
# compose.yml only), so local incremental builds continue to use the host
# target/ bind-mount unchanged.

services:
  tools:
    volumes:
      - ci-target:/workspace/target

volumes:
  ci-target:
    external: true
