# Host-side convenience lint. Graceful skip when ruff is not installed.
# The authoritative gate is python-lint-local (runs inside Docker via ci-local).
[tasks.python-lint]
description = "[optional] Run ruff lint on Python scripts and hooks (host, no docker)"
script_runner = "@shell"
script = ['RUFF="${RUFF_BIN:-.venv/bin/ruff}"; if [ -x "$RUFF" ] || command -v ruff >/dev/null 2>&1; then RUFF="${RUFF_BIN:-$(command -v ruff 2>/dev/null || echo .venv/bin/ruff)}"; "$RUFF" check scripts/; else echo "[python-lint] ruff not found, skipping (install: uv tool install ruff)"; fi']

[tasks.ci]
description = "[gate] Run CI checks (docker compose + host python-lint)"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "cargo", "make", "--allow-private", "ci-local"]

[tasks.add]
description = "[wrapper] Stage files for commit (use instead of git add)"
command = "git"
args = ["add", "${@}"]

[tasks.add-all]
description = "[wrapper] Stage all worktree changes except transient automation scratch files"
command = "bin/sotp"
args = ["make", "add-all"]

[tasks.unstage]
description = "[wrapper] Unstage paths (remove from index without discarding worktree changes)"
script_runner = "@shell"
script = ['bin/sotp make unstage "$@"']

[tasks.export-schema]
description = "[host] Export domain crate public API schema as JSON (requires nightly toolchain)"
script_runner = "@shell"
script = ['bin/sotp domain export-schema "$@"']

[tasks.test-nightly]
description = "[host] Run ignored tests that require nightly toolchain"
command = "cargo"
args = ["nextest", "run", "--run-ignored", "ignored-only", "-E", "package(infrastructure)"]

[tasks.track-branch-create]
description = "[wrapper] Create a track branch from main and switch to it (branch only; no metadata, no commit). (usage: cargo make track-branch-create '<track-id>')"
command = "bin/sotp"
args = ["make", "track-branch-create", "${@}"]

[tasks.track-branch-switch]
description = "[wrapper] Materialize branch metadata if needed, then switch to an existing track branch (usage: cargo make track-branch-switch '<track-id>')"
command = "bin/sotp"
args = ["make", "track-branch-switch", "${@}"]

[tasks.track-activate]
description = "[wrapper] Materialize a planning-only track and switch to its track branch (usage: cargo make track-activate '<track-id>')"
command = "bin/sotp"
args = ["make", "track-activate", "${@}"]

[tasks.track-plan-branch]
description = "[wrapper] Create a plan/<track-id> branch from main for planning-only review (usage: cargo make track-plan-branch '<track-id>')"
command = "bin/sotp"
args = ["make", "track-plan-branch", "${@}"]

[tasks.track-resolve]
description = "[wrapper] Resolve current track phase, next command, and blocker"
command = "bin/sotp"
args = ["make", "track-resolve", "${@}"]

[tasks.track-pr-push]
description = "[wrapper] Push current track/plan branch to origin (plan/ branches require track-id arg)"
command = "bin/sotp"
args = ["make", "track-pr-push", "${@}"]

[tasks.track-pr-ensure]
description = "[wrapper] Create or reuse a PR for the current track/plan branch (plan/ branches require track-id arg)"
command = "bin/sotp"
args = ["make", "track-pr-ensure", "${@}"]

[tasks.track-pr]
description = "[wrapper] Push current branch and create/reuse a PR (push + ensure-pr in one step)"
command = "bin/sotp"
args = ["make", "track-pr", "${@}"]

[tasks.track-pr-review]
description = "[wrapper] Run full PR review cycle: push, ensure PR, trigger @codex review, poll, parse"
command = "bin/sotp"
args = ["make", "track-pr-review", "${@}"]

[tasks.track-pr-merge]
description = "[wrapper] Wait for PR checks to pass, then merge"
command = "bin/sotp"
args = ["make", "track-pr-merge", "${@}"]

[tasks.track-pr-status]
description = "[wrapper] Show PR check status"
command = "bin/sotp"
args = ["make", "track-pr-status", "${@}"]

[tasks.track-local-plan]
description = "[wrapper] Run the local Codex planner through the repo-owned Rust wrapper"
script_runner = "@shell"
script = ['bin/sotp make track-local-plan "$@"']

[tasks.track-local-review]
description = "[wrapper] Run the local Codex reviewer through the repo-owned Rust wrapper. Runs `cargo make fmt` and `bin/sotp make track-sync-views` first so review scope hashes are computed against fmt-stable + view-up-to-date sources. Without the fmt prelude, a `cargo fmt` reflow during pre-commit would re-write source files, drift the scope hash, and force a re-review even when no semantic delta exists. Without the sync-views prelude, an approval at hash H followed by a later `track-sync-views` flap would desync the approval from the on-disk state and force a re-review at commit time."
script_runner = "@shell"
script = ['cargo make fmt && bin/sotp make track-sync-views && bin/sotp make track-local-review "$@"']

[tasks.track-set-commit-hash]
description = "[wrapper] Write current HEAD SHA to .commit_hash (set v2 diff base)"
script_runner = "@shell"
script = ['bin/sotp make track-set-commit-hash "$@"']

[tasks.track-review-status]
description = "[wrapper] Show per-scope review status for a track"
script_runner = "@shell"
script = ['bin/sotp make track-review-status "$@"']

[tasks.track-check-approved]
description = "[wrapper] Check that the review state is approved and code hash is current"
script_runner = "@shell"
script = ['bin/sotp make track-check-approved "$@"']

[tasks.track-signals]
description = "[wrapper] Evaluate confidence signals for a track's spec.json"
script_runner = "@shell"
script = ['bin/sotp track signals "$@"']

[tasks.track-baseline-capture]
description = "[wrapper] Capture TypeGraph baseline for TDDD reverse signal filtering. Always idempotent (existing baseline is preserved). Usage: cargo make track-baseline-capture -- <track-id> [--layer <id>]"
script_runner = "@shell"
script = ['bin/sotp track baseline-capture "$@"']

[tasks.track-switch-main]
description = "[wrapper] Switch to main branch and pull latest"
command = "bin/sotp"
args = ["make", "track-switch-main"]

[tasks.track-add-paths]
description = "[wrapper] Stage paths listed in tmp/track-commit/add-paths.txt and delete the scratch file"
command = "bin/sotp"
args = ["make", "track-add-paths"]

[tasks.commit]
description = "[gate] Run CI then commit (via sotp make)"
command = "bin/sotp"
args = ["make", "commit", "${@}"]

[tasks.track-commit-message]
description = "[wrapper] Run CI (output to tmp/ci-output.log) then commit using tmp/track-commit/commit-message.txt"
command = "bin/sotp"
args = ["make", "track-commit-message"]

[tasks.note]
description = "[git] Attach a git note to HEAD (usage: cargo make note '<note text>')"
command = "bin/sotp"
args = ["make", "note", "${@}"]

[tasks.track-note]
description = "[wrapper] Attach a git note from tmp/track-commit/note.md and delete the scratch file"
command = "bin/sotp"
args = ["make", "track-note"]

[tasks.track-transition]
description = "[wrapper] Transition a task status and sync rendered views. Usage: cargo make track-transition -- <track_dir> <task_id> <status> [--commit-hash <hash>]. Example: cargo make track-transition -- track/items/my-track T001 done --commit-hash abc1234"
command = "bin/sotp"
args = ["make", "track-transition", "${@}"]

[tasks.track-add-task]
description = "[wrapper] Add a new task to a track"
script_runner = "@shell"
script = ['bin/sotp make track-add-task "$@"']

[tasks.track-next-task]
description = "[wrapper] Show the next open task for a track (JSON)"
command = "bin/sotp"
args = ["make", "track-next-task", "${@}"]

[tasks.track-task-counts]
description = "[wrapper] Show task status counts for a track (JSON)"
command = "bin/sotp"
args = ["make", "track-task-counts", "${@}"]

[tasks.track-set-override]
description = "[wrapper] Set or clear a status override on a track"
script_runner = "@shell"
script = ['bin/sotp make track-set-override "$@"']

[tasks.track-sync-views]
description = "[wrapper] Render plan.md and registry.md from metadata.json"
command = "bin/sotp"
args = ["make", "track-sync-views", "${@}"]

[tasks.clean]
description = "[wrapper] Remove compose resources"
command = "docker"
args = ["compose", "down", "--volumes", "--remove-orphans"]
