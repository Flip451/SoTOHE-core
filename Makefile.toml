[config]
skip_core_tasks = true
default_to_workspace = false

[env]
DOCKER_BUILDKIT = "1"
COMPOSE_DOCKER_CLI_BUILD = "1"


[tasks.prepare-local-cache-dirs]
private = true
description = "[internal] Prepare host-owned cache directories for compose bind mounts"
script_runner = "@shell"
script = ['''
TARGET_DIR="target"
if [ -n "${WORKER_ID:-}" ]; then
  TARGET_DIR="target-${WORKER_ID}"
fi
mkdir -p "$TARGET_DIR" .cache/cargo/registry .cache/cargo/git .cache/sccache .cache/home
''']

[tasks.help]
description = "Show available tasks with category labels: [wrapper] [fast] [gate] [internal]"
command = "cargo"
args = ["make", "--list-all-steps"]

[tasks.bootstrap]
description = "[gate] Build Docker images, sotp CLI, and run CI"
script_runner = "@shell"
script = ['''
set -e
echo "=== Bootstrap: development environment setup ==="

# 1. Check prerequisites
echo ""
echo "--- Step 1/6: Check prerequisites ---"
if ! command -v docker >/dev/null 2>&1; then
  echo "[FAIL] docker not found. Install Docker first."
  exit 1
fi
if ! docker compose version >/dev/null 2>&1; then
  echo "[FAIL] docker compose not found. Install Docker Compose V2."
  exit 1
fi
echo "[OK] docker and docker compose available"

if ! command -v cargo >/dev/null 2>&1; then
  echo "[FAIL] cargo not found. Install Rust: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh"
  exit 1
fi
echo "[OK] cargo available"

# 2. Docker images
echo ""
echo "--- Step 2/6: Build Docker images ---"
mkdir -p target .cache/cargo/registry .cache/cargo/git .cache/sccache .cache/home
docker compose build tools
echo "[OK] Docker tools image built"

# 3. Build sotp CLI binary
echo ""
echo "--- Step 3/6: Build sotp CLI binary ---"
cargo make build-sotp
echo "[OK] bin/sotp built and installed"

# 4. Git hooks path
echo ""
echo "--- Step 4/6: Configure git hooks path ---"
if [ "$(git config --local core.hooksPath 2>/dev/null || true)" = ".githooks" ]; then
  echo "[OK] core.hooksPath already set"
else
  git config --local core.hooksPath .githooks
  echo "[OK] core.hooksPath set to .githooks"
fi
chmod +x .githooks/reference-transaction .githooks/pre-push 2>/dev/null || true

# 5. CI
echo ""
echo "--- Step 5/6: Run CI ---"
docker compose run --rm tools cargo make --allow-private ci-local
echo "[OK] CI passed"

# 6. Git notes fetch refspec
echo ""
echo "--- Step 6/6: Configure git notes fetch refspec ---"
if git remote get-url origin >/dev/null 2>&1; then
  if git config --get-all remote.origin.fetch | grep -q 'refs/notes'; then
    echo "[OK] git notes refspec already configured"
  else
    git config --add remote.origin.fetch "+refs/notes/*:refs/notes/*"
    echo "[OK] git notes refspec added to origin"
  fi
else
  echo "[SKIP] no origin remote found; git notes refspec not configured"
fi

echo ""
echo "=== Bootstrap complete ==="
''']

[tasks.build-sotp]
description = "[host] Build sotp CLI binary and install to bin/sotp (with runtime verification)"
script_runner = "@shell"
script = ['''
TARGET_DIR="${CARGO_TARGET_DIR:-target}"
cargo build -p cli --release && mkdir -p bin && cp "$TARGET_DIR/release/sotp" bin/sotp.tmp || exit 1
# Post-build verification: ensure the NEW binary is actually executable on this system.
# Verify BEFORE replacing the old binary so a glibc mismatch doesn't destroy the working install.
if bin/sotp.tmp --help >/dev/null 2>&1; then
  mv -f bin/sotp.tmp bin/sotp || { echo "[ERROR] failed to install bin/sotp" >&2; exit 1; }
  echo "[OK] bin/sotp built and verified"
else
  echo "[ERROR] bin/sotp.tmp was built but cannot execute on this system." >&2
  echo "        This usually means a glibc version mismatch." >&2
  echo "        Try building inside the tools container instead." >&2
  echo "        The previous bin/sotp (if any) was preserved." >&2
  rm -f bin/sotp.tmp
  exit 1
fi
''']

[tasks.build-tools]
description = "[wrapper] Build tools image"
command = "docker"
args = ["compose", "build", "tools"]

[tasks.build-dev]
description = "[wrapper] Build dev watcher image for compose.dev overlay"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "build", "app"]

[tasks.up]
description = "[wrapper] Start dev watcher with compose.dev overlay (default)"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "up", "-d", "app"]

[tasks.down]
description = "[wrapper] Stop compose stack with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "down"]

[tasks.logs]
description = "[wrapper] Show dev watcher logs with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "logs", "-f", "app"]

[tasks.ps]
description = "[wrapper] Show compose services with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "ps"]

[tasks.shell]
description = "[wrapper] Open shell in tools container"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "bash"]

# Local quality tasks (executed inside container by default)
[tasks.fmt-local]
private = true
description = "[internal] Format all Rust code"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-check-local]
private = true
description = "[internal] Check formatting"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.clippy-local]
private = true
description = "[internal] Run clippy with warnings denied"
command = "cargo"
args = ["clippy", "--locked", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.test-local]
private = true
description = "[internal] Run tests with nextest"
env = { SOTP_TELEMETRY = "0" }
command = "cargo"
args = ["nextest", "run", "--locked", "--all-targets", "--all-features", "--no-tests=warn"]

[tasks.test-doc-local]
private = true
description = "[internal] Run documentation tests"
env = { SOTP_TELEMETRY = "0" }
command = "cargo"
args = ["test", "--locked", "--doc", "--all-features"]

[tasks.test-nocapture-local]
private = true
description = "[internal] Run tests with stdout/stderr shown"
env = { SOTP_TELEMETRY = "0" }
command = "cargo"
args = ["test", "--locked", "--all-features", "--", "--nocapture"]

[tasks.check-local]
private = true
description = "[internal] Run cargo check"
command = "cargo"
args = ["check", "--locked", "--all-targets", "--all-features"]

[tasks.deny-local]
private = true
description = "[internal] Run dependency policy checks"
command = "cargo"
args = ["deny", "--locked", "check"]

[tasks.machete-local]
private = true
description = "[internal] Find unused dependencies"
command = "cargo"
args = ["machete"]

[tasks.clippy-tests-local]
private = true
description = "[internal] Run clippy for test targets"
