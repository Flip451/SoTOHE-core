[config]
skip_core_tasks = true
default_to_workspace = false

[env]
DOCKER_BUILDKIT = "1"
COMPOSE_DOCKER_CLI_BUILD = "1"
TAKT_PYTHON = { script = ["if [ -n \"${PYTHON_BIN:-}\" ]; then echo \"$PYTHON_BIN\"; elif [ -x .venv/bin/python ]; then echo .venv/bin/python; else echo python3; fi"] }

[tasks.prepare-local-cache-dirs]
private = true
description = "[internal] Prepare host-owned cache directories for compose bind mounts"
script_runner = "@shell"
script = ['''
TARGET_DIR="target"
if [ -n "${WORKER_ID:-}" ]; then
  TARGET_DIR="target-${WORKER_ID}"
fi
mkdir -p "$TARGET_DIR" .cache/cargo/registry .cache/cargo/git .cache/sccache .cache/home .cache/pytest
''']

[tasks.help]
description = "Show available tasks with category labels: [wrapper] [fast] [gate] [internal]"
command = "cargo"
args = ["make", "--list-all-steps"]

[tasks.guides-list]
description = "[wrapper] List external long-form guide registry entries"
command = "python3"
args = ["scripts/external_guides.py", "list"]

[tasks.guides-fetch]
description = "[wrapper] Fetch external long-form guides into local cache (not git-managed)"
command = "python3"
args = ["scripts/external_guides.py", "fetch", "${@}"]

[tasks.guides-usage]
description = "[wrapper] Show minimal-context usage policy for external guides"
command = "python3"
args = ["scripts/external_guides.py", "usage"]

[tasks.guides-setup]
description = "[wrapper] Show the recommended setup flow for external long-form guides"
command = "python3"
args = ["scripts/external_guides.py", "setup"]

[tasks.guides-clean]
description = "[wrapper] Remove cached external guide files (all or by id)"
command = "python3"
args = ["scripts/external_guides.py", "clean", "${@}"]

[tasks.guides-add]
description = "[wrapper] Add an external long-form guide entry"
command = "python3"
args = ["scripts/external_guides.py", "add", "${@}"]

[tasks.conventions-add]
description = "[wrapper] Add a project convention document and update index"
command = "python3"
args = ["scripts/convention_docs.py", "add", "${@}"]

[tasks.conventions-update-index]
description = "[wrapper] Regenerate project convention README index"
command = "python3"
args = ["scripts/convention_docs.py", "update-index"]

[tasks.conventions-verify-index]
description = "[wrapper] Verify project convention README index is in sync"
command = "python3"
args = ["scripts/convention_docs.py", "verify-index"]

[tasks.architecture-rules-workspace-members]
description = "[wrapper] List workspace members from architecture rule source of truth"
command = "python3"
args = ["scripts/architecture_rules.py", "workspace-members"]

[tasks.architecture-rules-direct-checks]
description = "[wrapper] Emit direct cargo-deny check pairs from architecture rules"
command = "python3"
args = ["scripts/architecture_rules.py", "direct-checks"]

[tasks.architecture-rules-verify-sync]
description = "[wrapper] Verify architecture rules sync with Cargo.toml and deny.toml"
command = "python3"
args = ["scripts/architecture_rules.py", "verify-sync"]

[tasks.architecture-rules-verify-claude-workspace-map]
description = "[wrapper] Verify CLAUDE.md workspace map includes all workspace members"
command = "python3"
args = ["scripts/architecture_rules.py", "verify-claude-workspace-map"]

[tasks.takt-failure-report]
description = "[wrapper] Generate .takt/debug-report.md from captured failure output"
command = "python3"
args = ["scripts/takt_failure_report.py", "${@}"]

[tasks.guides-selftest-local]
private = true
description = "[internal] Run self-tests for the external guides helper"
command = "pytest"
args = ["-q", "-o", "cache_dir=.cache/pytest", "scripts/test_external_guides.py"]

[tasks.guides-selftest]
description = "[wrapper] Run self-tests for the external guides helper (docker compose)"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "cargo", "make", "--allow-private", "guides-selftest-local"]

[tasks.scripts-selftest-local]
private = true
description = "[internal] Run verify and helper script regression tests"
command = "pytest"
args = [
  "-q",
  "-o",
  "cache_dir=.cache/pytest",
  "scripts/test_architecture_rules.py",
  "scripts/test_atomic_write.py",
  "scripts/test_check_layers.py",
  "scripts/test_verify_scripts.py",
  "scripts/test_convention_docs.py",
  "scripts/test_external_guides.py",
  "scripts/test_git_ops.py",
  "scripts/test_make_wrappers.py",
  "scripts/test_takt_failure_report.py",
  "scripts/test_takt_profile.py",
  "scripts/test_track_schema.py",
  "scripts/test_track_markdown.py",
  "scripts/test_track_state_machine.py",
  "scripts/test_track_registry.py",
  "scripts/test_takt_personas.py",
]

[tasks.scripts-selftest]
description = "[wrapper] Run verify and helper script regression tests"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "cargo", "make", "--allow-private", "scripts-selftest-local"]

[tasks.python-lint-local]
private = true
description = "[internal] Run ruff lint on Python scripts and hooks"
script_runner = "@shell"
script = ['ruff check scripts/ .claude/hooks/']

[tasks.hooks-selftest-local]
private = true
description = "[internal] Run Claude hook Python self-tests"
command = "pytest"
args = [
  "-q",
  "-o",
  "cache_dir=.cache/pytest",
  ".claude/hooks",
]

[tasks.takt-add]
description = "[wrapper] Add a task to takt queue (piece selected interactively)"
env = { TAKT_SESSION = "1" }
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py add-task "$CARGO_MAKE_TASK_ARGS"']

[tasks.takt-run]
description = "[wrapper] Run pending tasks from .takt/tasks.yaml"
env = { TAKT_SESSION = "1" }
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py run-queue']

[tasks.takt-render-personas]
description = "[wrapper] Render takt runtime personas from the active profile"
env = { TAKT_SESSION = "1" }
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py render-personas']

[tasks.takt-full-cycle]
description = "[wrapper] Run full-cycle piece directly with guardrails"
env = { TAKT_SESSION = "1" }
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py run-piece full-cycle "$CARGO_MAKE_TASK_ARGS"']

[tasks.takt-spec-to-impl]
description = "[wrapper] Run spec-to-impl piece directly with guardrails"
env = { TAKT_SESSION = "1" }
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py run-piece spec-to-impl "$CARGO_MAKE_TASK_ARGS"']

[tasks.takt-impl-review]
description = "[wrapper] Run impl-review piece directly with guardrails"
env = { TAKT_SESSION = "1" }
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py run-piece impl-review "$CARGO_MAKE_TASK_ARGS"']

[tasks.takt-tdd-cycle]
description = "[wrapper] Run tdd-cycle piece directly with guardrails"
env = { TAKT_SESSION = "1" }
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py run-piece tdd-cycle "$CARGO_MAKE_TASK_ARGS"']

[tasks.takt-clean-queue]
description = "[wrapper] Remove non-pending tasks from takt queue"
script_runner = "@shell"
script = ['exec "$TAKT_PYTHON" scripts/takt_profile.py clean-queue']

[tasks.bootstrap]
description = "[gate] Set up host Python venv, build Docker images, and run CI"
script_runner = "@shell"
script = ['''
set -e
echo "=== Bootstrap: development environment setup ==="

# 1. Check prerequisites
echo ""
echo "--- Step 1/4: Check prerequisites ---"
if ! command -v docker >/dev/null 2>&1; then
  echo "[FAIL] docker not found. Install Docker first."
  exit 1
fi
if ! docker compose version >/dev/null 2>&1; then
  echo "[FAIL] docker compose not found. Install Docker Compose V2."
  exit 1
fi
echo "[OK] docker and docker compose available"

if ! command -v uv >/dev/null 2>&1; then
  echo "[FAIL] uv not found. Install: curl -LsSf https://astral.sh/uv/install.sh | sh"
  exit 1
fi
echo "[OK] uv available"

# 2. Python venv + dependencies
echo ""
echo "--- Step 2/4: Python venv + dependencies ---"
if [ ! -d .venv ]; then
  echo "Creating .venv ..."
  uv venv .venv
fi
echo "Installing Python dependencies from requirements-python.txt ..."
uv pip install --python .venv/bin/python -r requirements-python.txt
echo "[OK] Python dependencies installed"

# 3. Docker images
echo ""
echo "--- Step 3/4: Build Docker images ---"
mkdir -p target .cache/cargo/registry .cache/cargo/git .cache/sccache .cache/home .cache/pytest
docker compose build tools
echo "[OK] Docker tools image built"

# 4. CI
echo ""
echo "--- Step 4/4: Run CI ---"
docker compose run --rm tools cargo make --allow-private ci-local
echo "[OK] CI passed"

echo ""
echo "=== Bootstrap complete ==="
''']

[tasks.build-tools]
description = "[wrapper] Build tools image"
command = "docker"
args = ["compose", "build", "tools"]

[tasks.build-dev]
description = "[wrapper] Build dev watcher image for compose.dev overlay"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "build", "app"]

[tasks.up]
description = "[wrapper] Start dev watcher with compose.dev overlay (default)"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "up", "-d", "app"]

[tasks.down]
description = "[wrapper] Stop compose stack with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "down"]

[tasks.logs]
description = "[wrapper] Show dev watcher logs with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "logs", "-f", "app"]

[tasks.ps]
description = "[wrapper] Show compose services with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "ps"]

[tasks.shell]
description = "[wrapper] Open shell in tools container"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "bash"]

[tasks.tools-up]
description = "[fast] Start resident tools-daemon container for exec-based feedback"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "up", "-d", "tools-daemon"]

[tasks.tools-down]
description = "[fast] Stop resident tools-daemon container"
command = "docker"
args = ["compose", "stop", "tools-daemon"]

# Daemon-exec wrappers (fast TDD loop — requires tools-daemon running: cargo make tools-up)
# When WORKER_ID is set, each exec gets its own CARGO_TARGET_DIR to prevent build lock contention.
[tasks.fmt-exec]
description = "[fast] Run fmt via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
  WORKER_ENV="-e CARGO_TARGET_DIR=/workspace/target-${WORKER_ID}"
fi
docker compose exec -T $WORKER_ENV tools-daemon cargo make --allow-private fmt-local
''']

[tasks.clippy-exec]
description = "[fast] Run clippy via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
  WORKER_ENV="-e CARGO_TARGET_DIR=/workspace/target-${WORKER_ID}"
fi
docker compose exec -T $WORKER_ENV tools-daemon cargo make --allow-private clippy-local
''']

[tasks.test-exec]
description = "[fast] Run all tests via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
  WORKER_ENV="-e CARGO_TARGET_DIR=/workspace/target-${WORKER_ID}"
fi
docker compose exec -T $WORKER_ENV tools-daemon cargo make --allow-private test-local
''']

[tasks.test-one-exec]
description = "[fast] Run a single nextest test via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
  WORKER_ENV="-e CARGO_TARGET_DIR=/workspace/target-${WORKER_ID}"
fi
docker compose exec -T $WORKER_ENV tools-daemon cargo nextest run --locked "$CARGO_MAKE_TASK_ARGS"
''']

[tasks.check-exec]
description = "[fast] Run cargo check via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
