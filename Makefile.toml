args = ["pr", "ensure-pr", "${@}"]

[tasks.track-pr-review]
description = "[wrapper] Run full PR review cycle: push, ensure PR, trigger @codex review, poll, parse"
command = "bin/sotp"
args = ["pr", "review-cycle", "${@}"]

[tasks.track-active-gate]
private = true
description = "[gate] Regen sequence: signal calc-impl-catalog → signal calc-catalog-spec → views sync (T020 / D8: argless; active track and layers resolved internally). Both track-commit-message and review invocations depend on this shared task (D4 symmetry, CN-11 DRY). Fail-closed: non-zero exit aborts the chain (CN-09)."
script_runner = "@shell"
script = ['''
set -e
bin/sotp signal calc-impl-catalog
bin/sotp signal calc-catalog-spec
bin/sotp track views sync
''']

[tasks.track-set-commit-hash]
description = "[wrapper] Write current HEAD SHA to .commit_hash (set v2 diff base)"
command = "bin/sotp"
args = ["track", "set-commit-hash", "${@}"]

[tasks.track-switch-main]
description = "[wrapper] Switch to main branch and pull latest"
command = "bin/sotp"
args = ["git", "switch-and-pull", "main"]

[tasks.track-local-review-fix-codex]
description = "[wrapper] Resolve CODEX_BIN for toolchain-manager shims, then launch the Codex review-fix-lead fixer via bin/sotp review fix-local"
script_runner = "@shell"
script = ['case "${1:-}" in --) shift ;; esac; CODEX_BIN="${CODEX_BIN:-$(asdf which codex 2>/dev/null || command -v codex)}" bin/sotp review fix-local "$@"']

[tasks.track-local-dry-fix]
description = "[wrapper] Resolve CODEX_BIN for toolchain-manager shims, then launch the Codex dry-fix-lead fixer via bin/sotp dry fix-local"
script_runner = "@shell"
script = ['case "${1:-}" in --) shift ;; esac; CODEX_BIN="${CODEX_BIN:-$(asdf which codex 2>/dev/null || command -v codex)}" bin/sotp dry fix-local "$@"']

[tasks.track-add-paths]
description = "[wrapper] Stage paths listed in tmp/track-commit/add-paths.txt and delete the scratch file"
command = "bin/sotp"
args = ["git", "add-from-file", "tmp/track-commit/add-paths.txt", "--cleanup"]

[tasks.track-commit-message]
description = "[wrapper] Regenerate signals + views (via track-active-gate; that gate runs no ref-verify call), then run the strict commit gate: stage working tree, full cargo make ci, code-review gate (review not approved → BLOCK), semantic review refresh (`sotp ref-verify run` — the scope derives from track artifact existence, so pre-Phase-1 tracks pass with zero pairs; the only writing step, positioned after the code-review gate per CN-02 / IN-02), re-stage to capture verify-cache artifact writes, `sotp ref-verify check-approved` (non-Pass pairs → BLOCK; same existence-derived scope), DRY gate (`sotp dry check-approved`; unresolved DRY violations → BLOCK), commit from tmp/track-commit/commit-message.txt, persist HEAD SHA to .commit_hash. The regen sequence is shared with review invocations via track-active-gate (CN-11 DRY, AC-12). The strict checks (ci + check-approved + semantic review + DRY gate) are NOT weakened by the bare-chain refactor (CN-12)."
dependencies = ["track-active-gate"]
script_runner = "@shell"
script = ['''
bin/sotp git add-all && \
cargo make ci && \
bin/sotp review check-approved && \
bin/sotp ref-verify run && \
bin/sotp git add-all && \
bin/sotp ref-verify check-approved && \
bin/sotp dry check-approved && \
bin/sotp git commit-from-file tmp/track-commit/commit-message.txt --cleanup && \
bin/sotp track set-commit-hash
''']

[tasks.note]
description = "[git] Attach a git note to HEAD (usage: cargo make note '<note text>')"
command = "git"
args = ["notes", "add", "-f", "-m", "${@}", "HEAD"]

[tasks.track-note]
description = "[wrapper] Attach a git note from tmp/track-commit/note.md and delete the scratch file"
command = "bin/sotp"
args = ["git", "note-from-file", "tmp/track-commit/note.md", "--cleanup"]


[tasks.clean]
description = "[wrapper] Remove compose resources"
command = "docker"
args = ["compose", "down", "--volumes", "--remove-orphans"]
