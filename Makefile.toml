args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "ps"]

[tasks.shell]
description = "[wrapper] Open shell in tools container"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "bash"]

[tasks.tools-up]
description = "[fast] Start resident tools-daemon container for exec-based feedback"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "up", "-d", "tools-daemon"]

[tasks.tools-down]
description = "[fast] Stop resident tools-daemon container"
command = "docker"
args = ["compose", "stop", "tools-daemon"]

# Daemon-exec wrappers (fast TDD loop — requires tools-daemon running: cargo make tools-up)
# When WORKER_ID is set, each exec gets its own CARGO_TARGET_DIR to prevent build lock contention.
[tasks.fmt-exec]
description = "[fast] Run fmt via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
  WORKER_ENV="-e CARGO_TARGET_DIR=/workspace/target-${WORKER_ID}"
fi
docker compose exec -T $WORKER_ENV tools-daemon cargo make --allow-private fmt-local
''']

[tasks.clippy-exec]
description = "[fast] Run clippy via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
