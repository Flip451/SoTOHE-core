args = ["make", "--allow-private", "verify-latest-track-local"]

[tasks.ci-rust]
description = "[gate] Run Rust-only CI checks (docker compose) — inner loop for app developers"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "cargo", "make", "--allow-private", "ci-rust-local"]

# Host-side convenience lint. Graceful skip when ruff is not installed.
# The authoritative gate is python-lint-local (runs inside Docker via ci-local).
[tasks.python-lint]
description = "[optional] Run ruff lint on Python scripts and hooks (host, no docker)"
script_runner = "@shell"
script = ['RUFF="${RUFF_BIN:-.venv/bin/ruff}"; if [ -x "$RUFF" ] || command -v ruff >/dev/null 2>&1; then RUFF="${RUFF_BIN:-$(command -v ruff 2>/dev/null || echo .venv/bin/ruff)}"; "$RUFF" check scripts/ .claude/hooks/; else echo "[python-lint] ruff not found, skipping (install: uv tool install ruff)"; fi']

[tasks.ci]
description = "[gate] Run CI checks (docker compose + host python-lint)"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "cargo", "make", "--allow-private", "ci-local"]

[tasks.add]
description = "[wrapper] Stage files for commit (use instead of git add)"
command = "git"
args = ["add", "${@}"]

[tasks.add-all]
description = "[wrapper] Stage all worktree changes except transient .takt pending files"
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/git_ops.py add-all']

[tasks.add-pending-paths]
description = "[wrapper] Stage paths listed in .takt/pending-add-paths.txt and delete the pending file"
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/git_ops.py add-from-file .takt/pending-add-paths.txt --cleanup']

[tasks.track-add-paths]
description = "[wrapper] Stage paths listed in tmp/track-commit/add-paths.txt and delete the scratch file"
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/git_ops.py add-from-file tmp/track-commit/add-paths.txt --cleanup']

[tasks.commit]
description = "[gate] Run CI then commit"
dependencies = ["ci"]
script_runner = "@shell"
script = ['git commit -m "$CARGO_MAKE_TASK_ARGS"']

[tasks.commit-pending-message]
description = "[wrapper] Run CI then commit using .takt/pending-commit-message.txt"
dependencies = ["ci"]
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/git_ops.py commit-from-file .takt/pending-commit-message.txt --cleanup']

[tasks.track-commit-message]
description = "[wrapper] Run CI then commit using tmp/track-commit/commit-message.txt"
dependencies = ["ci"]
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/git_ops.py commit-from-file tmp/track-commit/commit-message.txt --cleanup']

[tasks.note]
description = "[git] Attach a git note to HEAD (usage: cargo make note '<note text>')"
script_runner = "@shell"
script = ['git notes add -f -m "$CARGO_MAKE_TASK_ARGS" HEAD']

[tasks.note-pending]
description = "[wrapper] Attach a git note from .takt/pending-note.md and delete the pending file"
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/git_ops.py note-from-file .takt/pending-note.md --cleanup']

[tasks.track-note]
description = "[wrapper] Attach a git note from tmp/track-commit/note.md and delete the scratch file"
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/git_ops.py note-from-file tmp/track-commit/note.md --cleanup']

[tasks.track-transition]
description = "[wrapper] Transition a task status and sync rendered views"
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/track_state_machine.py transition $CARGO_MAKE_TASK_ARGS']

[tasks.track-sync-views]
description = "[wrapper] Render plan.md and registry.md from metadata.json"
script_runner = "@shell"
script = ['"${PYTHON_BIN:-python3}" scripts/track_state_machine.py sync-views $CARGO_MAKE_TASK_ARGS']

[tasks.clean]
description = "[wrapper] Remove compose resources"
command = "docker"
args = ["compose", "down", "--volumes", "--remove-orphans"]
