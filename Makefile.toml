description = "[internal] Generate HTML coverage report"
env = { SOTP_TELEMETRY = "0" }
command = "cargo"
args = ["llvm-cov", "nextest", "--html", "--all-features", "--locked"]

[tasks.check-layers-local]
private = true
description = "[internal] Check architectural layer dependencies"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify layers']

[tasks.verify-arch-docs-local]
