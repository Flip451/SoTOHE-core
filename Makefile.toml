fi
docker compose exec -T $WORKER_ENV tools-daemon cargo make --allow-private check-local
''']

[tasks.machete-exec]
description = "[fast] Run cargo-machete via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
  WORKER_ENV="-e CARGO_TARGET_DIR=/workspace/target-${WORKER_ID}"
fi
docker compose exec -T $WORKER_ENV tools-daemon cargo make --allow-private machete-local
''']

[tasks.deny-exec]
description = "[fast] Run cargo-deny via tools-daemon exec (requires tools-up)"
dependencies = ["prepare-local-cache-dirs"]
script_runner = "@shell"
script = ['''
WORKER_ENV=""
if [ -n "${WORKER_ID:-}" ]; then
  WORKER_ENV="-e CARGO_TARGET_DIR=/workspace/target-${WORKER_ID}"
