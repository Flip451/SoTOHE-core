[config]
skip_core_tasks = true
default_to_workspace = false

[env]
DOCKER_BUILDKIT = "1"
COMPOSE_DOCKER_CLI_BUILD = "1"


[tasks.prepare-local-cache-dirs]
private = true
description = "[internal] Prepare host-owned cache directories for compose bind mounts"
script_runner = "@shell"
script = ['''
TARGET_DIR="target"
if [ -n "${WORKER_ID:-}" ]; then
  TARGET_DIR="target-${WORKER_ID}"
fi
mkdir -p "$TARGET_DIR" .cache/cargo/registry .cache/cargo/git .cache/sccache .cache/home .cache/pytest
''']

[tasks.help]
description = "Show available tasks with category labels: [wrapper] [fast] [gate] [internal]"
command = "cargo"
args = ["make", "--list-all-steps"]

[tasks.guides-list]
description = "[wrapper] List external long-form guide registry entries"
command = "python3"
args = ["scripts/external_guides.py", "list"]

[tasks.guides-fetch]
description = "[wrapper] Fetch external long-form guides into local cache (not git-managed)"
command = "python3"
args = ["scripts/external_guides.py", "fetch", "${@}"]

[tasks.guides-usage]
description = "[wrapper] Show minimal-context usage policy for external guides"
command = "python3"
args = ["scripts/external_guides.py", "usage"]

[tasks.guides-setup]
description = "[wrapper] Show the recommended setup flow for external long-form guides"
command = "python3"
args = ["scripts/external_guides.py", "setup"]

[tasks.guides-clean]
description = "[wrapper] Remove cached external guide files (all or by id)"
command = "python3"
args = ["scripts/external_guides.py", "clean", "${@}"]

[tasks.guides-add]
description = "[wrapper] Add an external long-form guide entry"
command = "python3"
args = ["scripts/external_guides.py", "add", "${@}"]

[tasks.conventions-add]
description = "[wrapper] Add a project convention document and update index"
command = "python3"
args = ["scripts/convention_docs.py", "add", "${@}"]

[tasks.conventions-update-index]
description = "[wrapper] Regenerate project convention README index"
command = "python3"
args = ["scripts/convention_docs.py", "update-index"]

[tasks.conventions-verify-index]
description = "[wrapper] Verify project convention README index is in sync"
command = "python3"
args = ["scripts/convention_docs.py", "verify-index"]

[tasks.architecture-rules-workspace-members]
description = "[wrapper] List workspace members from architecture rule source of truth"
command = "python3"
args = ["scripts/architecture_rules.py", "workspace-members"]

[tasks.workspace-tree]
description = "[wrapper] Render crate-only workspace tree from architecture rule source of truth"
command = "python3"
args = ["scripts/architecture_rules.py", "workspace-tree"]

[tasks.workspace-tree-full]
description = "[wrapper] Render workspace tree including extra non-crate directories"
command = "python3"
args = ["scripts/architecture_rules.py", "workspace-tree-full"]

[tasks.architecture-rules-direct-checks]
description = "[wrapper] Emit direct cargo-deny check pairs from architecture rules"
command = "python3"
args = ["scripts/architecture_rules.py", "direct-checks"]

[tasks.architecture-rules-verify-sync]
description = "[wrapper] Verify architecture rules sync with Cargo.toml and deny.toml"
command = "python3"
args = ["scripts/architecture_rules.py", "verify-sync"]

[tasks.guides-selftest-local]
private = true
description = "[internal] Run self-tests for the external guides helper"
command = "pytest"
args = ["-q", "-o", "cache_dir=.cache/pytest", "scripts/test_external_guides.py"]

[tasks.guides-selftest]
description = "[wrapper] Run self-tests for the external guides helper (docker compose)"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "cargo", "make", "--allow-private", "guides-selftest-local"]

[tasks.scripts-selftest-local]
private = true
description = "[internal] Run verify and helper script regression tests"
command = "pytest"
args = [
  "-q",
  "-o",
  "cache_dir=.cache/pytest",
  "scripts/test_architecture_rules.py",
  "scripts/test_atomic_write.py",
  "scripts/test_convention_docs.py",
  "scripts/test_external_guides.py",
  "scripts/test_make_wrappers.py",
  "scripts/test_track_resolution.py",
]

[tasks.scripts-selftest]
description = "[wrapper] Run verify and helper script regression tests"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "run", "--rm", "tools", "cargo", "make", "--allow-private", "scripts-selftest-local"]

[tasks.python-lint-local]
private = true
description = "[internal] Run ruff lint on Python helper scripts under scripts/"
script_runner = "@shell"
script = ['ruff check scripts/']

[tasks.bootstrap]
description = "[gate] Set up host Python venv, build Docker images, and run CI"
script_runner = "@shell"
script = ['''
set -e
echo "=== Bootstrap: development environment setup ==="

# 1. Check prerequisites
echo ""
echo "--- Step 1/6: Check prerequisites ---"
if ! command -v docker >/dev/null 2>&1; then
  echo "[FAIL] docker not found. Install Docker first."
  exit 1
fi
if ! docker compose version >/dev/null 2>&1; then
  echo "[FAIL] docker compose not found. Install Docker Compose V2."
  exit 1
fi
echo "[OK] docker and docker compose available"

if ! command -v cargo >/dev/null 2>&1; then
  echo "[FAIL] cargo not found. Install Rust: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh"
  exit 1
fi
echo "[OK] cargo available"

if ! command -v uv >/dev/null 2>&1; then
  echo "[FAIL] uv not found. Install: curl -LsSf https://astral.sh/uv/install.sh | sh"
  exit 1
fi
echo "[OK] uv available"

# 2. Python venv + dependencies
echo ""
echo "--- Step 2/6: Python venv + dependencies ---"
if [ ! -d .venv ]; then
  echo "Creating .venv ..."
  uv venv .venv
fi
echo "Installing Python dependencies from requirements-python.txt ..."
uv pip install --python .venv/bin/python -r requirements-python.txt
echo "[OK] Python dependencies installed"

# 3. Docker images
echo ""
echo "--- Step 3/6: Build Docker images ---"
mkdir -p target .cache/cargo/registry .cache/cargo/git .cache/sccache .cache/home .cache/pytest
docker compose build tools
echo "[OK] Docker tools image built"

# 4. Build sotp CLI binary
echo ""
echo "--- Step 4/6: Build sotp CLI binary ---"
cargo make build-sotp
echo "[OK] bin/sotp built and installed"

# 5. CI
echo ""
echo "--- Step 5/6: Run CI ---"
docker compose run --rm tools cargo make --allow-private ci-local
echo "[OK] CI passed"

# 6. Git notes fetch refspec
echo ""
echo "--- Step 6/6: Configure git notes fetch refspec ---"
if git remote get-url origin >/dev/null 2>&1; then
  if git config --get-all remote.origin.fetch | grep -q 'refs/notes'; then
    echo "[OK] git notes refspec already configured"
  else
    git config --add remote.origin.fetch "+refs/notes/*:refs/notes/*"
    echo "[OK] git notes refspec added to origin"
  fi
else
  echo "[SKIP] no origin remote found; git notes refspec not configured"
fi

echo ""
echo "=== Bootstrap complete ==="
''']

[tasks.build-sotp]
description = "[host] Build sotp CLI binary and install to bin/sotp (with runtime verification)"
script_runner = "@shell"
script = ['''
TARGET_DIR="${CARGO_TARGET_DIR:-target}"
cargo build -p cli --release && mkdir -p bin && cp "$TARGET_DIR/release/sotp" bin/sotp.tmp || exit 1
# Post-build verification: ensure the NEW binary is actually executable on this system.
# Verify BEFORE replacing the old binary so a glibc mismatch doesn't destroy the working install.
if bin/sotp.tmp --help >/dev/null 2>&1; then
  mv -f bin/sotp.tmp bin/sotp || { echo "[ERROR] failed to install bin/sotp" >&2; exit 1; }
  echo "[OK] bin/sotp built and verified"
else
  echo "[ERROR] bin/sotp.tmp was built but cannot execute on this system." >&2
  echo "        This usually means a glibc version mismatch." >&2
  echo "        Try building inside the tools container instead." >&2
  echo "        The previous bin/sotp (if any) was preserved." >&2
  rm -f bin/sotp.tmp
  exit 1
fi
''']

[tasks.build-tools]
description = "[wrapper] Build tools image"
command = "docker"
args = ["compose", "build", "tools"]

[tasks.build-dev]
description = "[wrapper] Build dev watcher image for compose.dev overlay"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "build", "app"]

[tasks.up]
description = "[wrapper] Start dev watcher with compose.dev overlay (default)"
dependencies = ["prepare-local-cache-dirs"]
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "up", "-d", "app"]

[tasks.down]
description = "[wrapper] Stop compose stack with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "down"]

[tasks.logs]
description = "[wrapper] Show dev watcher logs with compose.dev overlay (default)"
command = "docker"
args = ["compose", "-f", "compose.yml", "-f", "compose.dev.yml", "logs", "-f", "app"]

[tasks.ps]
description = "[wrapper] Show compose services with compose.dev overlay (default)"
