description = "[internal] Verify local Git config core.hooksPath points at .githooks"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify hooks-path']

[tasks.verify-track-registry-local]
private = true
description = "[internal] Verify track registry.md is in sync with metadata.json"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- track views validate --project-root .']

[tasks.verify-canonical-modules-local]
private = true
description = "[internal] Verify no reimplementation of canonical module concerns"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify canonical-modules']

[tasks.verify-module-size-local]
private = true
description = "[internal] Verify Rust source file sizes against module_limits"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify module-size']

[tasks.verify-domain-strings-local]
private = true
description = "[internal] Verify no pub String fields in domain layer"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify domain-strings']

[tasks.verify-domain-purity-local]
private = true
description = "[internal] Verify domain layer hexagonal purity (no forbidden I/O patterns)"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify domain-purity']

[tasks.verify-usecase-purity-local]
private = true
description = "[internal] Verify usecase layer hexagonal purity (no forbidden patterns)"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify usecase-purity']

[tasks.verify-view-freshness-local]
private = true
description = "[internal] Verify plan.md is up-to-date with metadata.json"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify view-freshness']

[tasks.verify-latest-track-local]
private = true
description = "[internal] Verify latest track has spec.md (or spec.json) and plan.md"
script_runner = "@shell"
script = ['cargo run --quiet -p cli -- verify latest-track']

[tasks.verify-plan-artifact-refs-local]
private = true
description = "[internal] Verify plan artifact refs + task-coverage integrity (active-track auto-resolved from branch)"
command = "cargo"
args = ["run", "--quiet", "-p", "cli", "--", "verify", "plan-artifact-refs"]

[tasks.verify-adr-signals-local]
private = true
description = "[internal] Verify ADR decision signal grounds across knowledge/adr/ (chain ⓪ check-adr-user --gate commit). Red blocks; strictness resolved from signal-gates.json."
command = "cargo"
args = ["run", "--quiet", "-p", "cli", "--", "signal", "check-adr-user", "--gate", "commit"]

[tasks.verify-spec-states-current-local]
private = true
description = "[internal] Chain ① check-spec-adr --gate commit: verify current track spec.json→ADR signals. Active track auto-resolved from branch; skips on non-track branches or absent spec.json."
script_runner = "@shell"
script = ['''
set -e
BRANCH=$(git rev-parse --abbrev-ref HEAD)
case "$BRANCH" in
  track/*)
    TRACK_ID="${BRANCH#track/}"
    SPEC_JSON="track/items/${TRACK_ID}/spec.json"
    if [ ! -f "$SPEC_JSON" ]; then
      printf "[SKIP] verify-spec-states-current-local: spec.json absent (Phase 0 or pre-Phase-1); skipping\n"
      exit 0
    fi
    cargo run --quiet -p cli -- signal check-spec-adr --gate commit --spec-json "$SPEC_JSON"
    ;;
  *)
    printf "[SKIP] verify-spec-states-current-local: not on a track branch; skipping\n"
    exit 0
    ;;
esac
''']

[tasks.signal-check-impl-catalog-local]
private = true
description = "[internal] Chain ③ check-impl-catalog --gate commit: argless impl↔catalog signal gate (T020 / D8 — active track and layers resolved internally). Skips gracefully when not on a track branch."
script_runner = "@shell"
script = ['''
set -e
BRANCH=$(git rev-parse --abbrev-ref HEAD)
case "$BRANCH" in
  track/*)
    cargo run --quiet -p cli -- signal check-impl-catalog --gate commit
    ;;
  *)
    printf "[SKIP] signal-check-impl-catalog-local: not on a track branch; skipping\n"
    exit 0
    ;;
esac
''']

[tasks.verify-catalogue-spec-refs-local]
private = true
description = "[internal] Verify catalogue-spec ref integrity (SoT Chain ② binary gate: dangling / drift / stale) per ADR 2026-04-23-0344 §D1.5. Active track auto-resolved from branch (IN-03, IN-08)."
command = "cargo"
args = ["run", "--quiet", "-p", "cli", "--", "verify", "catalogue-spec-refs"]

[tasks.check-catalogue-spec-signals-local]
private = true
description = "[internal] Chain ② check-catalog-spec --gate commit: argless catalog→spec signal gate (T020 / D8 — active track and layers resolved internally). Skips gracefully when not on a track branch."
script_runner = "@shell"
script = ['''
set -e
BRANCH=$(git rev-parse --abbrev-ref HEAD)
case "$BRANCH" in
  track/*)
    cargo run --quiet -p cli -- signal check-catalog-spec --gate commit
    ;;
  *)
    printf "[SKIP] check-catalogue-spec-signals-local: not on a track branch; skipping\n"
    exit 0
    ;;
esac
''']

[tasks.ci-rust-local]
private = true
description = "[internal] Run Rust-only CI checks (fmt + clippy + test + deny + check-layers + canonical-modules)"
dependencies = ["fmt-check-local", "clippy-local", "test-local", "deny-local", "check-layers-local", "verify-canonical-modules-local"]

[tasks.ci-local]
private = true
description = "[internal] Run local CI checks"
dependencies = ["fmt-check-local", "clippy-local", "test-local", "test-doc-local", "deny-local", "check-layers-local", "verify-arch-docs-local", "verify-doc-links-local", "verify-plan-progress-local", "verify-track-metadata-local", "verify-track-registry-local", "verify-tech-stack-local", "verify-hooks-path-local", "verify-canonical-modules-local", "verify-latest-track-local", "verify-module-size-local", "verify-domain-strings-local", "verify-domain-purity-local", "verify-usecase-purity-local", "verify-view-freshness-local", "verify-plan-artifact-refs-local", "verify-adr-signals-local", "verify-spec-states-current-local", "verify-doc-hidden-local", "signal-check-impl-catalog-local", "verify-catalogue-spec-refs-local", "check-catalogue-spec-signals-local"]

[tasks.ci-rust-container]
description = "[gate] Run Rust-only CI checks inside a pre-existing container (no docker compose)"
dependencies = ["fmt-check-local", "clippy-local", "test-local", "deny-local", "check-layers-local", "verify-canonical-modules-local"]

[tasks.ci-container]
description = "[gate] Run CI checks inside a pre-existing container (no docker compose)"
dependencies = ["fmt-check-local", "clippy-local", "test-local", "test-doc-local", "deny-local", "check-layers-local", "verify-arch-docs-local", "verify-doc-links-local", "verify-plan-progress-local", "verify-track-metadata-local", "verify-track-registry-local", "verify-tech-stack-local", "verify-hooks-path-local", "verify-canonical-modules-local", "verify-latest-track-local", "verify-module-size-local", "verify-domain-strings-local", "verify-domain-purity-local", "verify-usecase-purity-local", "verify-view-freshness-local", "verify-plan-artifact-refs-local", "verify-adr-signals-local", "verify-spec-states-current-local", "verify-doc-hidden-local", "signal-check-impl-catalog-local", "verify-catalogue-spec-refs-local", "check-catalogue-spec-signals-local"]

