[tasks.verify-plan-artifact-refs-local]
private = true
description = "[internal] Verify plan artifact refs + task-coverage integrity (branch-bound track resolution)"
script_runner = "@shell"
script = ['''
BRANCH=$(git branch --show-current 2>/dev/null || true)
case "$BRANCH" in
  track/*)
    TRACK_ID="${BRANCH#track/}"
    TRACK_DIR="track/items/$TRACK_ID"
    if [ -d "$TRACK_DIR" ]; then
      cargo run --quiet -p cli -- verify plan-artifact-refs --track-dir "$TRACK_DIR"
    else
      echo "[FAIL] Track dir not found: $TRACK_DIR (branch maps to missing track)"
      exit 1
    fi
    ;;
  plan/*)
    TRACK_ID="${BRANCH#plan/}"
    TRACK_DIR="track/items/$TRACK_ID"
    if [ -d "$TRACK_DIR" ]; then
      cargo run --quiet -p cli -- verify plan-artifact-refs --track-dir "$TRACK_DIR"
    else
      echo "[FAIL] Track dir not found: $TRACK_DIR (branch maps to missing track)"
      exit 1
    fi
    ;;
  *)
    echo "[SKIP] Not on a track or plan branch (branch: ${BRANCH:-detached})"
    ;;
esac
''']

[tasks.verify-spec-states-current-local]
private = true
description = "[internal] Verify current track's spec.json signals in CI interim mode. Yellow surfaces as Finding::warning; only red blocks. Strict enforcement happens at sotp pr wait-and-merge."
script_runner = "@shell"
script = ['''
BRANCH=$(git branch --show-current 2>/dev/null || true)
case "$BRANCH" in
  track/*)
    TRACK_ID="${BRANCH#track/}"
    SPEC_PATH="track/items/$TRACK_ID/spec.md"
    if [ -f "$SPEC_PATH" ]; then
      cargo run --quiet -p cli -- verify spec-states "$SPEC_PATH"
    else
      echo "[SKIP] $SPEC_PATH not found"
    fi
    ;;
  plan/*|main)
    echo "[SKIP] $BRANCH is not a track branch"
    ;;
  *)
    echo "[SKIP] not on a track branch (branch: ${BRANCH:-detached})"
    ;;
esac
''']

[tasks.verify-catalogue-spec-refs-local]
private = true
description = "[internal] Verify catalogue-spec ref integrity (SoT Chain ② binary gate: dangling / drift / stale) per ADR 2026-04-23-0344 §D1.5"
script_runner = "@shell"
script = ['''
